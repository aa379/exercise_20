<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁作業 - 固定定位</title>
    <style>
        /* 整體背景設為淺灰色 */
        body {
            font-family: "Times New Roman", serif;
            background-color: #eeeeee;
            margin: 0;
            padding: 50px;
        }

        /* 底部白色大框框 */
        .white-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 800px;
            height: 200px;
            margin: 0 auto;
            padding: 30px;
            border: 1px solid #ddd;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        /* 表格樣式 */
        table {
            border-collapse: collapse;
            width: 150px;
            border: 2px solid black;
        }

        th, td {
            border: 1px solid black;
            padding: 12px;
            text-align: left;
            font-size: 20px;
        }

        th {
            background-color: #808080;
            color: white;
        }

        .yellow-bg {
            background-color: #ffff00;
        }

        /* 固定在右上角的綠色框框 */
        .fixed-box {
            position: fixed; /* 關鍵：固定定位 */
            top: 20px;       /* 距離頂部 20px */
            right: 20px;     /* 距離右側 20px */
            border: 4px solid #73AD21;
            padding: 15px;
            width: 150px;
            background-color: white;
            font-size: 18px;
            line-height: 1.2;
            z-index: 999;    /* 確保它在最上層 */
        }
    </style>
</head>
<body>

    <div class="white-container">
        
        <table>
            <thead>
                <tr>
                    <th>Firstname</th>
                    <th>Lastname</th>
                </tr>
            </thead>
            <tbody>
                <tr class="yellow-bg">
                    <td>1</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>2</td>
                </tr>
                <tr class="yellow-bg">
                    <td>3</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>

    </div>

    <div class="fixed-box">
        This div<br>
        element has<br>
        position: fixed;
    </div>

</body>
</html>
